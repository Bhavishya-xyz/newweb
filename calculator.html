<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f4f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        text-align: center;
        width: 350px;
    }

    h2 {
        color: #333;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        font-size: 16px;
    }

    button {
        background: #007BFF;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        border-radius: 5px;
        font-size: 16px;
    }

    button:hover {
        background: #0056b3;
    }

    #result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        color: green;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Age Calculator</h2>

    <label>Select Your Date of Birth:</label><br>
    <input type="date" id="dob"><br>

    <button onclick="calculateAge()">Calculate Age</button>

    <div id="result"></div>
</div>

<script>
function calculateAge() {
    let dob = document.getElementById("dob").value;

    if (dob === "") {
        document.getElementById("result").innerHTML =
        "Please select your date of birth!";
        return;
    }

    let birthDate = new Date(dob);
    let today = new Date();

    let years = today.getFullYear() - birthDate.getFullYear();
    let months = today.getMonth() - birthDate.getMonth();
    let days = today.getDate() - birthDate.getDate();

    if (days < 0) {
        months--;
        let lastMonth = new Date(
            today.getFullYear(),
            today.getMonth(),
            0
        ).getDate();
        days += lastMonth;
    }

    if (months < 0) {
        years--;
        months += 12;
    }

    document.getElementById("result").innerHTML =
        `Your Age is ${years} Years, ${months} Months and ${days} Days`;
}
</script>

</body>
</html>
